
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivy Imoh — Product Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --canvas:#FAFAF6;
    --canvas-alt:#F0EEE7;
    --ink:#15141B;
    --ink-soft:#5B5A66;
    --line: rgba(21,20,27,0.14);
    --cobalt:#3A55FF;
    --cobalt-dim: rgba(58,85,255,0.12);
    --coral:#FF5E3A;
    --coral-dim: rgba(255,94,58,0.13);
    --lime:#B8E600;
    --lime-dim: rgba(184,230,0,0.18);
    --grape:#7A2BFF;
    --grape-dim: rgba(122,43,255,0.12);
    --radius: 3px;
  }
 
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }
 
  body{
    margin:0;
    background:var(--canvas);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    font-size:16px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
 
  a{color:inherit;}
  ::selection{background:var(--lime); color:var(--ink);}
 
  .mono{
    font-family:'IBM Plex Mono', monospace;
    letter-spacing:0.02em;
  }
 
  h1,h2,h3{
    font-family:'Fraunces', serif;
    font-weight:600;
    margin:0;
    letter-spacing:-0.01em;
  }
 
  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:0 32px;
  }
 
  /* ---------- NAV ---------- */
  header{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(250,250,246,0.86);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  nav.wrap{
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:72px;
  }
  .brand{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.15rem;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-dot{
    width:11px;height:11px;border-radius:50%;
    background:var(--cobalt);
    box-shadow:14px 0 0 var(--coral), 28px 0 0 var(--lime);
    margin-right:22px;
  }
  .nav-links{
    display:flex;
    gap:34px;
    list-style:none;
    margin:0;padding:0;
    font-size:0.92rem;
  }
  .nav-links a{
    text-decoration:none;
    color:var(--ink-soft);
    position:relative;
    padding-bottom:4px;
    transition:color .15s ease;
  }
  .nav-links a:hover, .nav-links a:focus-visible{color:var(--ink);}
  .nav-links a::after{
    content:'';
    position:absolute; left:0; bottom:-2px;
    width:0; height:2px; background:var(--cobalt);
    transition:width .2s ease;
  }
  .nav-links a:hover::after, .nav-links a:focus-visible::after{width:100%;}
  .nav-cta{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.8rem;
    border:1px solid var(--ink);
    padding:9px 16px;
    border-radius:var(--radius);
    text-decoration:none;
    transition:background .15s ease, color .15s ease;
  }
  .nav-cta:hover{background:var(--ink); color:var(--canvas);}
  .menu-btn{display:none;}
 
  /* ---------- HERO ---------- */
  .hero{
    padding:110px 0 90px;
    position:relative;
    overflow:hidden;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.78rem;
    color:var(--ink-soft);
    border:1px solid var(--line);
    border-radius:100px;
    padding:6px 14px 6px 10px;
    margin-bottom:28px;
  }
  .eyebrow .pulse{
    width:7px;height:7px;border-radius:50%;background:var(--lime);
    box-shadow:0 0 0 3px var(--lime-dim);
  }
  .hero h1{
    font-size:clamp(2.6rem, 6vw, 5rem);
    line-height:1.02;
    max-width:900px;
  }
  .hero h1 .hl{color:var(--cobalt); font-style:italic;}
  .hero-sub{
    max-width:560px;
    margin-top:26px;
    font-size:1.15rem;
    color:var(--ink-soft);
  }
  .hero-actions{
    display:flex;
    gap:16px;
    margin-top:40px;
    flex-wrap:wrap;
  }
  .btn{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:0.95rem;
    padding:14px 26px;
    border-radius:var(--radius);
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:8px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary{
    background:var(--ink); color:var(--canvas);
  }
  .btn-primary:hover{transform:translate(-2px,-2px); box-shadow:4px 4px 0 var(--lime);}
  .btn-secondary{
    border:1px solid var(--ink);
    color:var(--ink);
  }
  .btn-secondary:hover{transform:translate(-2px,-2px); box-shadow:4px 4px 0 var(--coral);}
 
  .hero-meta{
    margin-top:70px;
    display:flex;
    gap:48px;
    flex-wrap:wrap;
    border-top:1px solid var(--line);
    padding-top:26px;
  }
  .hero-meta div{font-family:'IBM Plex Mono', monospace; font-size:0.78rem; color:var(--ink-soft);}
  .hero-meta strong{display:block; font-family:'Fraunces',serif; font-size:1.4rem; color:var(--ink); font-weight:600; margin-bottom:2px;}
 
  /* ---------- SECTION HEADS ---------- */
  section{padding:100px 0;}
  .section-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:24px;
    margin-bottom:56px;
    flex-wrap:wrap;
  }
  .section-tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.78rem;
    color:var(--cobalt);
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin-bottom:10px;
    display:block;
  }
  .section-head h2{font-size:clamp(2rem,3.4vw,2.8rem);}
  .section-head p{color:var(--ink-soft); max-width:420px; margin:0;}
 
  /* ---------- WORK: FRAME CARDS (signature element) ---------- */
  .work-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:48px 40px;
  }
  .frame-card{
    position:relative;
  }
  .frame-chrome{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    color:var(--ink-soft);
    padding:0 2px 10px;
  }
  .frame-chrome .fname{color:var(--ink);}
  .frame-dots{display:flex; gap:5px; margin-right:10px;}
  .frame-dots span{width:6px;height:6px;border-radius:50%; background:var(--line);}
  .frame-window{
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--canvas-alt);
    aspect-ratio:4/3;
    position:relative;
    overflow:hidden;
    transition:border-color .2s ease;
  }
  .frame-card:hover .frame-window{border-color:var(--ink);}
  .mock{
    position:absolute; inset:14px;
    display:flex; flex-direction:column; gap:8px;
  }
  .mock-bar{height:22px; border-radius:4px; background:rgba(21,20,27,0.08); width:40%;}
  .mock-block{flex:1; border-radius:4px;}
  .mock-row{display:flex; gap:8px;}
  .mock-chip{height:10px; border-radius:20px; background:rgba(21,20,27,0.1);}
 
  .guides{
    position:absolute; inset:0;
    opacity:0; transition:opacity .2s ease;
    pointer-events:none;
  }
  .frame-card:hover .guides{opacity:1;}
  .guide-h, .guide-v{
    position:absolute;
    border-color: var(--ink);
  }
  .guide-h{ left:14px; right:14px; height:0; border-top:1px dashed rgba(21,20,27,0.35); }
  .guide-v{ top:14px; bottom:14px; width:0; border-left:1px dashed rgba(21,20,27,0.35); }
  .dim-label{
    position:absolute;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.62rem;
    background:var(--ink); color:var(--canvas);
    padding:2px 6px; border-radius:3px;
    opacity:0;
    transition:opacity .2s ease;
  }
  .frame-card:hover .dim-label{opacity:1;}
 
  .frame-body{padding-top:20px;}
  .frame-tags{display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;}
  .tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    padding:4px 9px;
    border-radius:20px;
  }
  .frame-body h3{font-size:1.4rem; margin-bottom:8px;}
  .frame-body p{color:var(--ink-soft); font-size:0.95rem; margin:0 0 14px;}
  .frame-link{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.8rem;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:6px;
    color:var(--ink);
    border-bottom:1px solid var(--ink);
    padding-bottom:1px;
  }
  .frame-link svg{transition:transform .15s ease;}
  .frame-link:hover svg{transform:translate(3px,-3px);}
 
  /* project color themes */
  .c-cobalt .mock-bar{background:var(--cobalt-dim);}
  .c-cobalt .mock-block{background:linear-gradient(135deg, var(--cobalt-dim), transparent);}
  .c-cobalt .mock-chip{background:var(--cobalt-dim);}
  .c-cobalt .tag{background:var(--cobalt-dim); color:var(--cobalt);}
 
  .c-coral .mock-bar{background:var(--coral-dim);}
  .c-coral .mock-block{background:linear-gradient(135deg, var(--coral-dim), transparent);}
  .c-coral .mock-chip{background:var(--coral-dim);}
  .c-coral .tag{background:var(--coral-dim); color:var(--coral);}
 
  .c-lime .mock-bar{background:var(--lime-dim);}
  .c-lime .mock-block{background:linear-gradient(135deg, var(--lime-dim), transparent);}
  .c-lime .mock-chip{background:var(--lime-dim);}
  .c-lime .tag{background:var(--lime-dim); color:#5c7500;}
 
  .c-grape .mock-bar{background:var(--grape-dim);}
  .c-grape .mock-block{background:linear-gradient(135deg, var(--grape-dim), transparent);}
  .c-grape .mock-chip{background:var(--grape-dim);}
  .c-grape .tag{background:var(--grape-dim); color:var(--grape);}
 
  /* ---------- PROCESS ---------- */
  .process-strip{
    background:var(--ink);
    color:var(--canvas);
  }
  .process-strip .section-tag{color:var(--lime);}
  .process-strip .section-head p{color:rgba(250,250,246,0.6);}
  .process-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:1px;
    background:rgba(250,250,246,0.14);
    border:1px solid rgba(250,250,246,0.14);
  }
  .process-step{
    background:var(--ink);
    padding:32px 26px;
  }
  .process-step .num{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.78rem;
    color:var(--lime);
    display:block;
    margin-bottom:20px;
  }
  .process-step h3{font-size:1.25rem; color:var(--canvas); margin-bottom:10px; font-weight:600;}
  .process-step p{color:rgba(250,250,246,0.6); font-size:0.92rem; margin:0;}
 
  /* ---------- ABOUT ---------- */
  .about-grid{
    display:grid;
    grid-template-columns:0.8fr 1.2fr;
    gap:60px;
    align-items:start;
  }
  .avatar{
    width:100%;
    aspect-ratio:1;
    border-radius:8px;
    background:linear-gradient(135deg, var(--cobalt), var(--grape) 50%, var(--coral));
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Fraunces', serif;
    font-size:5rem;
    font-weight:600;
    color:var(--canvas);
    position:relative;
    overflow:hidden;
  }
  .avatar::after{
    content:'';
    position:absolute; inset:0;
    background:repeating-linear-gradient(135deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 14px);
  }
  .about-body p{font-size:1.05rem; color:var(--ink-soft); margin:0 0 18px;}
  .about-body p strong{color:var(--ink);}
  .chip-row{display:flex; flex-wrap:wrap; gap:10px; margin-top:26px;}
  .skill-chip{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.78rem;
    padding:8px 14px;
    border:1px solid var(--line);
    border-radius:20px;
  }
 

  /* ---------- CONTACT ---------- */
  .contact{
    background:var(--canvas-alt);
    text-align:center;
    padding:120px 32px;
    position:relative;
  }
  .contact h2{
    font-size:clamp(2.4rem,6vw,4.2rem);
    max-width:820px;
    margin:0 auto 28px;
    line-height:1.05;
  }
  .contact h2 .hl{color:var(--coral); font-style:italic;}
  .contact-links{
    display:flex;
    justify-content:center;
    gap:28px;
    margin-top:38px;
    flex-wrap:wrap;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.9rem;
  }
  .contact-links a{text-decoration:none; border-bottom:1px solid var(--ink); padding-bottom:2px;}
 
  footer{
    padding:30px 32px;
    display:flex;
    justify-content:space-between;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.75rem;
    color:var(--ink-soft);
    border-top:1px solid var(--line);
    flex-wrap:wrap;
    gap:10px;
  }
